include:
  - project: DevOps/pipeline_templates
    ref: ec2
    file:
      - /pipelines/PanoramaCpp.gitlab-ci.yaml

stages:
  - check
  - package
  - release

lint:
  stage: check
  image: python:3.11
  script:
    - pip install -e ".[dev]"
    - ruff check sprout/ tests/
    - ruff format --check sprout/ tests/
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: check
  image: python:3.11
  script:
    - pip install -e ".[openai,dev]"
    - pytest tests/
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
