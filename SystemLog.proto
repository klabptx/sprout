
syntax = "proto2";

package precision.protobuf;
option go_package = "git.2020.dev/panorama/datadef-go/pb;pb";

import "google/protobuf/descriptor.proto";

import "Constants.proto";
import "CustomOptions.proto";

extend google.protobuf.FieldOptions
{
  // Event codes which are applicable to a diagnose table column
  repeated SystemLog.EventCode option_event_code = 211300;
}

message SystemLog {

enum AudibleAlarmState {
  EVENT_AUDIO_NONE  = 0 [(option_enum_name) = "None"];
  EVENT_AUDIO_ALERT = 1 [(option_enum_name) = "Alert"];
  EVENT_AUDIO_ALARM = 2 [(option_enum_name) = "Alarm"];
}

enum DisplayType {
  DISPLAY_POPUP = 0;
  DISPLAY_BANNER = 1;
}

message EventDefinition
{
  optional bool               instantaneous   =  3;
  optional AlertState         component_state = 12;
  optional AudibleAlarmState  audible_alarm   =  4;
  optional bool               display_warning =  5;
  optional DisplayType        display_type    = 15 [ default = DISPLAY_POPUP ];
  optional bool               disable_system  =  6;
  optional bool               clear_on_enable =  7;
  optional string             log_text        =  8;
  optional string             warning_text    =  9;
  optional string             description     = 10;
  optional string             recommendation  = 11;
  optional bool               warn_only_once_per_reset  = 13 [default = false];
  optional string             title           = 14;

  reserved 1, 2;
}

extend google.protobuf.EnumValueOptions
{
  optional EventDefinition option_event_definition  = 211200;
}

// -----------------------------------------------------------------------------
// Event Codes
// -----------------------------------------------------------------------------
